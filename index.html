<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>halcyon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <link rel="preload" href="assets/explode.mp4" as="video" type="video/mp4">
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000000;
      }

      body {
        overflow: hidden;
        font-family: "Quicksand", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: none;
      }

      .shell,
      .gameplay,
      .start-screen {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000000;
      }

      .start-screen {
        position: absolute;
        inset: 0;
        z-index: 6;
        display: grid;
        place-content: center;
        gap: 1rem;
        justify-items: center;
        color: #D8DDD9;
      }

      .start-screen h1 {
        margin: 0;
        color: #D8DDD9;
        font: inherit;
        font-size: 2.4rem;
        font-weight: 600;
        letter-spacing: 0;
      }

      .play-button {
        min-width: 7.5rem;
        min-height: 3rem;
        border: 0;
        border-radius: 0.65rem;
        background: #2F3432;
        color: #D8DDD9;
        font: inherit;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 0;
        cursor: pointer;
        touch-action: manipulation;
      }
    </style>
    <link rel="stylesheet" href="styles.css?v=2026-05-05-32">
  </head>
  <body>
    <main class="shell" aria-label="halcyon">
      <section id="gameplay" class="gameplay" aria-label="gameplay area">
        <div class="start-screen">
          <div class="home-anchor-layer" aria-hidden="true">
            <video class="home-anchor-backdrop" src="assets/timeline-2.mp4" muted playsinline preload="auto"></video>
          </div>
          <div class="start-stack">
            <h1>halcyon</h1>
            <div class="start-guide-item">
              <div class="home-collect-sprite">
                <svg viewBox="0 0 16 16" focusable="false">
                  <path class="spiral-depth" d="M8 8 C10.2 7.1 10.9 9.5 9.2 10.8 C6.9 12.7 3.9 10.7 4.3 7.7 C4.8 3.9 9.5 2.7 12.1 5.4 C14.9 8.4 13.3 13.1 9.4 14.1"></path>
                  <path class="spiral-core" d="M8 8 C10.2 7.1 10.9 9.5 9.2 10.8 C6.9 12.7 3.9 10.7 4.3 7.7 C4.8 3.9 9.5 2.7 12.1 5.4 C14.9 8.4 13.3 13.1 9.4 14.1"></path>
                  <circle class="spiral-highlight" cx="6.3" cy="5.2" r="1.1"></circle>
                </svg>
              </div>
              <div class="start-guide-label">collect</div>
            </div>
            <div class="start-guide-item">
              <div class="home-obstacle-sprite"></div>
              <div class="start-guide-label">avoid</div>
            </div>
            <div class="start-guide-item home-move-item">
              <div class="home-anchor-space" aria-hidden="true"></div>
              <div class="start-guide-label">move</div>
            </div>
            <button class="play-button" type="button">play</button>
          </div>
        </div>
        <div class="level-title" aria-hidden="true">level one</div>
        <div class="obstacle-field" aria-hidden="true"></div>
        <div class="spiral-field" aria-hidden="true"></div>
        <div class="triangle-test">
          <svg class="triangle-links" aria-hidden="true">
            <defs>
              <filter id="link-glow" x="-2000" y="-2000" width="4000" height="4000" filterUnits="userSpaceOnUse">
                <feGaussianBlur stdDeviation="7" result="wide-glow"></feGaussianBlur>
                <feFlood flood-color="#ff2f2f" flood-opacity="0.75" result="glow-color"></feFlood>
                <feComposite in="glow-color" in2="wide-glow" operator="in" result="colored-glow"></feComposite>
                <feGaussianBlur stdDeviation="2" result="soft-glow"></feGaussianBlur>
                <feMerge>
                  <feMergeNode in="colored-glow"></feMergeNode>
                  <feMergeNode in="soft-glow"></feMergeNode>
                  <feMergeNode in="SourceGraphic"></feMergeNode>
                </feMerge>
              </filter>
            </defs>
            <line class="triangle-link triangle-link-1"></line>
            <line class="triangle-link triangle-link-2"></line>
            <line class="triangle-link triangle-link-3"></line>
          </svg>
          <div class="asset-node asset-node-1" aria-hidden="true">
            <video class="triangle-video triangle-video-1" src="assets/timeline-2.mp4" muted playsinline preload="auto"></video>
            <div class="asset-handle"></div>
          </div>
          <div class="asset-node asset-node-2" aria-hidden="true">
            <video class="triangle-video triangle-video-2" src="assets/timeline-2.mp4" muted playsinline preload="auto"></video>
            <div class="asset-handle"></div>
          </div>
          <div class="asset-node asset-node-3" aria-hidden="true">
            <video class="triangle-video triangle-video-3" src="assets/timeline-2.mp4" muted playsinline preload="auto"></video>
            <div class="asset-handle"></div>
          </div>
          <div class="triangle-center-anchor" aria-hidden="true"></div>
        </div>
        <div class="cursor" aria-hidden="true"></div>
        <div class="move-hud" aria-hidden="true">
          <div>minimum moves <span class="minimum-moves-value">0</span></div>
          <div>player moves <span class="player-moves-value">0</span></div>
        </div>
        <div class="close-call-message" aria-live="polite">close call!</div>
        <div class="game-over-screen" aria-live="polite">
          <div class="game-over-score-line">score: 0</div>
          <button class="again-button" type="button">again?</button>
          <div class="high-score-status" hidden>
            <div>new high score, neat</div>
            <div class="high-score-rank"></div>
          </div>
          <form class="score-form" hidden>
            <input class="player-name-input" name="player-name" maxlength="20" autocomplete="off" placeholder="name">
            <button class="score-submit-button" type="submit">submit</button>
          </form>
          <ol class="leaderboard-list"></ol>
        </div>
        <div class="level-complete-screen" aria-live="polite">
          <div>level complete</div>
          <div class="score-line">score 0</div>
        </div>
        <audio id="play-loop-audio" preload="auto" loop>
          <source src="assets/audio/halcyon_play_loop.ogg" type="audio/ogg">
          <source src="assets/audio/halcyon_play_loop.mp3" type="audio/mpeg">
        </audio>
        <audio id="lost-loop-audio" preload="auto" loop>
          <source src="assets/audio/halcyon_lost_loop.ogg" type="audio/ogg">
          <source src="assets/audio/halcyon_lost_loop.mp3" type="audio/mpeg">
        </audio>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="game.js?v=2026-05-05-41"></script>
  </body>
</html>
